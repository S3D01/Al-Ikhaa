<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة أسرة الإخاء</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&family=Tajawal:wght@400;500;700&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fff4d9;
    --panel:#fffaf0;
    --paper:#fffdf6;
    --paper-dim:#e7d9b3;
    --tan:#b3a47d;
    --tan-deep:#8f7f57;
    --blue:#1c3f66;
    --blue-soft:#3a5d85;
    --line:rgba(28,63,102,0.18);
    --line-strong:rgba(28,63,102,0.35);
    --granted:#1c3f66;
    --granted-deep:#12283f;
    --denied:#a6402b;
    --denied-deep:#78301f;
    --ink:#1c3f66;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    background:var(--bg);
    font-family:'Tajawal', sans-serif;
    color:var(--blue);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
  }

  .rig{
    width:100%;
    max-width:920px;
  }

  .plant-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    margin-bottom:22px;
    padding:0 4px;
  }
  .plant-title{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .plant-title .bolt{
    width:14px;height:14px;border-radius:50%;
    background:var(--blue);
    box-shadow:0 0 0 3px rgba(28,63,102,0.15);
  }
  .plant-title h1{
    font-family:'Cairo', sans-serif;
    font-weight:900;
    font-size:22px;
    letter-spacing:0.5px;
    margin:0;
    color:var(--blue);
  }
  .plant-sub{
    font-family:'Chakra Petch', monospace;
    font-size:11px;
    letter-spacing:2px;
    color:var(--tan-deep);
    text-transform:uppercase;
    opacity:0.9;
  }
  .panel{
    background:var(--panel);
    border:1px solid var(--line-strong);
    border-radius:16px;
    padding:26px;
    display:grid;
    grid-template-columns:1fr;
    gap:22px;
    box-shadow:0 20px 45px -25px rgba(28,63,102,0.35);
  }
  @media(min-width:760px){
    .panel{grid-template-columns: 260px 1fr;}
  }

  /* Logo uploader */
  .logo-zone{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:12px;
    background:var(--paper);
    border:1px solid var(--line-strong);
    border-radius:12px;
    padding:16px;
    text-align:center;
    min-height:200px;
  }
  .logo-zone img{
    max-width:100%;
    max-height:160px;
    object-fit:contain;
    border-radius:6px;
  }

  /* Form */
  .form-col{
    display:flex;
    flex-direction:column;
    gap:14px;
    justify-content:center;
  }
  .field label{
    display:block;
    font-size:12px;
    font-family:'Chakra Petch', monospace;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--tan-deep);
    margin-bottom:6px;
  }
  .field input{
    width:100%;
    background:var(--paper);
    border:1px solid var(--line-strong);
    border-radius:10px;
    padding:13px 14px;
    font-family:'Tajawal';
    font-size:16px;
    color:var(--blue);
    outline:none;
    transition:border-color .2s, box-shadow .2s;
  }
  .field input::placeholder{ color:#9faec0; }
  .field input:focus{
    border-color:var(--tan);
    box-shadow:0 0 0 3px rgba(179,164,125,0.28);
  }
  .row2{display:flex; gap:12px; flex-wrap:wrap;}
  .row2 .field{flex:1; min-width:140px;}

  .generate-btn{
    margin-top:6px;
    background:linear-gradient(180deg, var(--tan), var(--tan-deep));
    color:#fff;
    border:none;
    border-radius:10px;
    padding:14px;
    font-family:'Cairo';
    font-weight:800;
    font-size:16px;
    letter-spacing:0.5px;
    cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease;
    box-shadow:0 8px 18px -8px rgba(143,127,87,0.55);
  }
  .generate-btn:active{transform:translateY(1px) scale(0.995);}
  .generate-btn:disabled{opacity:0.5; cursor:not-allowed; box-shadow:none;}

  /* Ticket output — vertical / portrait */
  .ticket-wrap{
    margin-top:26px;
    display:flex;
    justify-content:center;
  }
  .ticket{
    width:100%;
    max-width:340px;
    background:var(--paper);
    color:var(--ink);
    border-radius:18px;
    display:flex;
    flex-direction:column;
    position:relative;
    overflow:hidden;
    box-shadow:0 25px 55px -28px rgba(28,63,102,0.45);
    border:1px solid var(--line);
    animation:pop .35s cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes pop{
    from{opacity:0; transform:translateY(14px) scale(0.98);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }
  .ticket.denied{background:#fdf3ee;}

  .stub{
    width:100%;
    height:34px;
    flex-shrink:0;
    background:repeating-linear-gradient(90deg, var(--tan) 0 12px, var(--blue) 12px 24px);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }
  .ticket.denied .stub{
    background:repeating-linear-gradient(90deg, var(--denied) 0 12px, var(--blue) 12px 24px);
  }
  .stub-text{
    font-family:'Chakra Petch', monospace;
    font-weight:700;
    letter-spacing:4px;
    font-size:12px;
    color:var(--blue);
    background:var(--paper);
    padding:4px 12px;
    border-radius:6px;
  }
  .perf{
    position:absolute;
    left:0; right:0; bottom:-8px;
    height:16px;
    background-image:radial-gradient(circle, var(--bg) 6px, transparent 6.5px);
    background-size:22px 16px;
    background-repeat:repeat-x;
  }

  .ticket-body{
    flex:1;
    padding:26px 22px 22px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:16px;
  }
  .t-head{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    border-bottom:1px dashed var(--paper-dim);
    padding-bottom:16px;
    width:100%;
  }
  .t-logo{
    width:64px;height:64px;
    border-radius:12px;
    overflow:hidden;
    background:var(--bg);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    border:1px solid var(--line);
  }
  .t-logo img{width:100%;height:100%;object-fit:contain;}
  .t-logo .fallback{
    color:var(--blue);
    font-family:'Cairo';font-weight:900;font-size:22px;
  }
  .t-plant-name{
    font-family:'Cairo';
    font-weight:800;
    font-size:16px;
    line-height:1.2;
    color:var(--blue);
  }
  .t-plant-sub{
    font-family:'Chakra Petch', monospace;
    font-size:10px;
    letter-spacing:1.5px;
    color:var(--tan-deep);
    text-transform:uppercase;
  }
  .t-id{
    font-family:'Chakra Petch', monospace;
    font-size:11px;
    color:var(--blue-soft);
  }

  .t-name{
    font-family:'Cairo';
    font-weight:900;
    font-size:24px;
    line-height:1.3;
    color:var(--blue);
  }
  .t-meta{
    display:flex;
    flex-direction:column;
    gap:10px;
    width:100%;
  }
  .t-meta div{
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px dotted var(--line);
    padding-bottom:6px;
  }
  .t-meta div label{
    font-family:'Chakra Petch', monospace;
    font-size:10px;
    letter-spacing:1.5px;
    color:var(--tan-deep);
    text-transform:uppercase;
  }
  .t-meta div span{
    font-family:'Tajawal';
    font-weight:700;
    font-size:13px;
    color:var(--blue);
  }

  .status-line{
    margin-top:auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    width:100%;
    padding-top:6px;
  }
  .stamp{
    font-family:'Cairo';
    font-weight:900;
    font-size:15px;
    letter-spacing:1px;
    padding:8px 18px;
    border-radius:8px;
    border:3px solid currentColor;
    transform:rotate(-3deg);
    display:inline-block;
  }
  .stamp.granted{ color:var(--granted-deep); }
  .stamp.denied{ color:var(--denied-deep); }
  .stamp.employee{ color:var(--tan-deep); }

  .barcode{
    height:38px;
    width:100%;
    background:repeating-linear-gradient(90deg, var(--blue) 0 2px, transparent 2px 4px, var(--blue) 4px 5px, transparent 5px 9px);
    opacity:0.85;
  }

  .empty-hint{
    text-align:center;
    color:var(--blue-soft);
    font-size:13px;
    padding:6px 0 0;
  }

</style>
</head>

// ---- normalize arabic text for reliable matching ----
function normalize(str){
  return str
    .trim()
    .replace(/\s+/g,' ')
    .replace(/[إأآا]/g,'ا')
    .replace(/ى/g,'ي')
    .replace(/ة/g,'ه')
    .replace(/ؤ/g,'و')
    .replace(/ئ/g,'ي')
    .replace(/[\u064B-\u0652]/g,'') // remove diacritics
    .toLowerCase();
}

function findEntry(first, last){
  const full = normalize(first + ' ' + last);
  return database.find(entry => normalize(entry.name) === full);
}

// ---- ticket generation ----
const generateBtn = document.getElementById('generateBtn');
const ticketWrap = document.getElementById('ticketWrap');

function randomId(){
  const n = Math.floor(1000 + Math.random()*9000);
  const d = new Date();
  return `GT-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}-${n}`;
}

function todayStr(){
  const d = new Date();
  return d.toLocaleDateString('ar-SA-u-nu-latn', { year:'numeric', month:'2-digit', day:'2-digit' });
}

function renderTicket({first, last, plant, result}){
  const fullName = `${first} ${last}`;
  const id = randomId();
  const date = todayStr();
  const denied = result.type === 'denied' || result.type === 'duplicate';
  const stampClass = result.type === 'employee' ? 'employee' : (denied ? 'denied' : 'granted');
  const gate = denied ? '—' : `بوابة ${Math.ceil(Math.random()*4)}`;

  const logoBlock = logoDataUrl
    ? `<img src="${logoDataUrl}" alt="شعار المصنع">`
    : `<span class="fallback">${(plant||'م').trim().charAt(0)}</span>`;

  ticketWrap.innerHTML = `
    <div class="ticket ${denied ? 'denied' : ''}">
      <div class="stub">
        <div class="perf"></div>
        <div class="stub-text">${denied ? 'مرفوض' : 'دخول'}</div>
      </div>
      <div class="ticket-body">
        <div class="t-head">
          <div class="t-logo">${logoBlock}</div>
          <div class="t-plant-name">${plant || 'المصنع'}</div>
          <div class="t-plant-sub">تذكرة دخول رسمية</div>
          <div class="t-id">${id}</div>
        </div>

        <div class="t-name">${result.headline}</div>

        ${denied ? '' : `
        <div class="t-meta">
          <div><label>الاسم</label><span>${fullName}</span></div>
          <div><label>التاريخ</label><span>${date}</span></div>
          <div><label>البوابة</label><span>${gate}</span></div>
        </div>
        `}

        <div class="status-line">
          <span class="stamp ${stampClass}">${result.stamp}</span>
          <div class="barcode"></div>
        </div>
      </div>
    </div>
  `;
}

generateBtn.addEventListener('click', ()=>{
  const first = document.getElementById('firstName').value.trim();
  const last = document.getElementById('lastName').value.trim();
  if(!first || !last){
    ticketWrap.innerHTML = `<div class="empty-hint">فضلاً أدخل الاسم الأول والثاني لإصدار التذكرة.</div>`;
    return;
  }
  const fullName = `${first} ${last}`;
  const entry = findEntry(first, last);
  const result = entry || { headline: 'مرحباً بضيف مصنع الإخاء', stamp: 'مسموح الدخول', type: 'granted' };
  renderTicket({first, last, plant: PLANT_NAME, result});
});

// enter key support
['firstName','lastName'].forEach(id=>{
  document.getElementById(id).addEventListener('keydown', (e)=>{
    if(e.key === 'Enter') generateBtn.click();
  });
});
</script>
